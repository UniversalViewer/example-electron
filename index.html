<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universal Viewer Electron CJS Example</title>
    <link rel="stylesheet" href="./node_modules/universalviewer/dist/uv.css" />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        min-height: 100vh;
        font-family: sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="root" class="uv"></div>
    <script>
      require('./dist/renderer.js');
    </script>
  </body>
</html>
